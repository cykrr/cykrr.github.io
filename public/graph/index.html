<!DOCTYPE html>
<html>
<head>
    <title>HW Math Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        button { padding: 8px 16px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; border-radius: 4px; font-family: sans-serif; }
        button:hover { background: #555; }
    </style>
  <script type="module" crossorigin src="/assets/main-BTP5nBhb.js"></script>
</head>
<body>
    <div id="ui">
        <button id="toggleMode">Switch to 2D</button>
        <span style="color: white; margin-left: 10px; font-family: sans-serif;">z = </span>
        <input type="text" id="mathInput" value="sin(x + t)" style="padding: 8px; border-radius: 4px; border: 1px solid #555; background: #222; color: #fff; width: 200px; font-family: monospace;">
        <span id="mathError" style="color: #ff4444; margin-left: 10px; font-family: sans-serif; display: none;"></span>
    </div>
</body>
</html>
